<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to KakaoTalk</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="status-bar">
  <div class="status-bar__column">No Service</div>
  <div class="status-bar__column">18:43</div>
  <div class="status-bar__column">11%</div>
</div>

<header class="welcome-header">
  <h1 class="welcome-header__title">Welcome to KakaoTalk</h1>
  <p class="welcome-header__text">Login with your email or phone number.</p>
</header>

<form action="friends.html" method="get" class="login-form">
  <input type="text" placeholder="Email or phone number">
  <input type="password" placeholder="Password">
  <input type="submit" value="Log In">
  <a class="login-form__btn" href="#">Sign Up</a>
  <a class="login-form__link" href="#">Find Kakao Account or Password</a>
</form>

</body>
</html>
